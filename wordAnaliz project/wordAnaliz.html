<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="wordAnaliz.css" />
    <script src="wordAnaliz.js" defer></script>
    <title>word-Counter project</title>
  </head>
  <body>
    <header>
      <h1 class="x-topic">Word <span class="x-topicUni">Analytics</span></h1>
      <h2 class="s-topic">JavaScript.ir</h2>
    </header>
    <div class="analizBox">
      <textarea placeholder="Enter your text" class="txtarea"></textarea>
      <section class="statu">
        <section class="statues">
          <span class="wordCounter">0</span>
          <h3>Words</h3>
        </section>
        <section class="statues">
          <span class="charCounter">0</span>
          <h3>Characters</h3>
        </section>
        <section class="statues">
          <span class="twitCounter">280</span>
          <h3>Twitter</h3>
        </section>
        <section class="statues">
          <span class="faceCounter">2200</span>
          <h3>Facebook</h3>
        </section>
      </section>
    </div>
    <footer>
      <small class="copyright"> &copy; Copyright by JS-camp repository All rights reserved </small>
      <small class="data"> Last checked limits: 17 days ago </small>
    </footer>
  </body>
</html>
